<!DOCTYPE html>
<html>
<head>
    <title>Invoice Automation Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(-45deg, #0d6efd, #6610f2, #20c997, #0dcaf0);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
        }

        @keyframes gradient {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .card {
            background-color: white;
        }
    </style>

    <script>
        function showLoader() {
            var fileInput = document.querySelector('input[type="file"]');
            var fileName = fileInput.files[0].name;

            document.getElementById("uploadSection").style.display = "none";
            document.getElementById("loaderSection").style.display = "block";
            document.getElementById("fileNameDisplay").innerText = fileName;

            simulateProgress();
        }

        function simulateProgress() {
            let bar = document.getElementById("progressBar");
            let width = 0;
            let interval = setInterval(function() {
                if (width >= 90) {
                    clearInterval(interval);
                } else {
                    width += 5;
                    bar.style.width = width + "%";
                    bar.innerHTML = width + "%";
                }
            }, 500);
        }
    </script>
</head>

<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h4 class="mb-4">Invoice OCR Automation System</h4>

        <div id="uploadSection">
            <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">
                <input class="form-control mb-3" type="file" name="file" required>
                <button type="submit" class="btn btn-dark">Upload & Process</button>
            </form>
        </div>

        <div id="loaderSection" style="display:none;">

            <div class="text-center">
                <div class="spinner-border text-dark" style="width:4rem;height:4rem;"></div>
                <h5 class="mt-3">Processing Invoice...</h5>
                <p id="fileNameDisplay"></p>
            </div>

            <div class="progress mt-4">
                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated"
                     style="width:0%">0%</div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
